services:
# ── Backend (Node.js) ────────────────────────────────────────────────────────
  backend:
    build: ./Backend
    container_name: mercado_backend
    # Usamos el watch nativo de Node 20 (Chau Nodemon, hola estabilidad)
    command: node --watch src/index.js
    tty: true        
    stdin_open: true 
    volumes:
      - ./Backend:/app
      - /app/node_modules
      - ./Backend/uploads:/app/uploads
      - ./Backend/database.sqlite:/app/database.sqlite
    environment:
      - PORT=4000
      - NODE_ENV=development
      - JWT_SECRET=hola
      - FRONTEND_URL=http://localhost
    networks:
      - app-network
  # ── Frontend (React) ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: mercado_frontend
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
      - REACT_APP_API_URL=/api
    networks:
      - app-network
    depends_on:
      - backend

  # ── NGINX (Proxy Inverso) ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mercado_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - frontend
      - backend

# Declaramos la red interna obligatoria
networks:
  app-network:
    driver: bridge